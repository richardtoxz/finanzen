[phases.setup]
aptPkgs = [
    "build-essential",  
    "python3-dev",      
    "libssl-dev",       
    "cargo",           
    "libmysqlclient-dev" 
]
pythonVersion = "3.11"

[phases.install]
cmds = [
    "pip install --no-cache-dir -r requirements.txt"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"


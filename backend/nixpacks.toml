[phases.setup]
aptPkgs = [
    "build-essential",  
    "python3-dev",      
    "libssl-dev",       
    "cargo",           
    "libmysqlclient-dev",
    "python3-pip"
]
pythonVersion = "3.11"

[phases.install]
cmds = [
    "pip3 install --no-cache-dir -r requirements.txt"
]

[start]
cmd = "python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"